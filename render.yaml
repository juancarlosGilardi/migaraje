services:
  - type: web
    name: migaraje-api
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: build
        value: ${DATABASE_URL}
      - key: DATABASE_URL
        scope: runtime
        value: ${DATABASE_URL}
      - key: SECRET_KEY
        scope: runtime
        value: ${SECRET_KEY}
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: CORS_ORIGINS
        value: https://migaraje-frontend.netlify.app,https://juancarlosgilardi.github.io
    staticPublishPath: frontend/dist
    routes:
      - path: /api
        matchType: prefix
